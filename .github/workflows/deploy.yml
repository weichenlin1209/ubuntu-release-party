name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 關鍵點 1：明確宣告此工作流對目前的儲存庫具有寫入權限
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    defaults:
      run:
        working-directory: ubuntu-party-2026

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          package_json_file: ubuntu-party-2026/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ubuntu-party-2026/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Slidev
        run: pnpm slidev build --base /ubuntu-release-party-2026/

      - name: Deploy to my repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ubuntu-party-2026/dist
